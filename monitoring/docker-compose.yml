# Prometheus + Grafana'ni bir buyruq bilan ko'tarish (ParkPulse'ni kuzatish uchun).
#
#   docker compose -f monitoring/docker-compose.yml up -d
#
# Keyin:
#   Prometheus → http://localhost:9090  (Status → Targets: parkpulse = UP bo'lsin)
#   Grafana    → http://localhost:3000  (login: admin / admin)
#
# ParkPulse ALOHIDA ishlaydi (bu compose uni ko'tarmaydi). prometheus.yml
# ichidagi target manzilini ParkPulse hostiga to'g'rilang.
services:
  prometheus:
    image: prom/prometheus:latest
    container_name: parkpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      # Linuxda host.docker.internal ishlashi uchun
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: parkpulse-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    restart: unless-stopped

volumes:
  grafana-data:
